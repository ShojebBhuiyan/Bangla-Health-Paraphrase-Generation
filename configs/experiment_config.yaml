experiment:
  name: bangla_health_paraphrasing
  seed: 42

dataset:
  source: faisal4590aziz/bangla-health-related-paraphrased-dataset
  raw_csv: datasets/all_paraphrased_data.csv
  train_split: 0.8
  validation_split: 0.1
  test_split: 0.1
  dev_subset: null
  max_input_length: 128
  max_target_length: 128
  min_tokens: 3
  max_tokens: 256

spark:
  app_name: BanglaHealthParaphrasing
  shuffle_partitions: 200
  driver_memory: 8g
  executor_memory: 8g
  enable_arrow: true
  near_dup_jaccard_threshold: 0.95
  near_dup_enabled: true

models:
  main:
    name: google/mt5-small
    key: mt5_lora
    use_lora: true
    train_batch_size: 8
    eval_batch_size: 8
    gradient_accumulation_steps: 4

  baselines:
    - name: google/mt5-small
      key: mt5_baseline
      use_lora: false
      train_batch_size: 4
      eval_batch_size: 4
      gradient_accumulation_steps: 8
    - name: facebook/mbart-large-50
      key: mbart_baseline
      use_lora: false
      train_batch_size: 1
      eval_batch_size: 1
      gradient_accumulation_steps: 32
      optim: adamw_bnb_8bit

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - q
    - v

training:
  learning_rate: 2.0e-5
  epochs: 5
  weight_decay: 0.01
  warmup_steps: 500
  label_smoothing: 0.1
  fp16: true
  gradient_checkpointing: true
  early_stopping: true
  early_stopping_patience: 2
  scheduler: cosine
  use_augmented_train: false
  num_beams: 4
  no_repeat_ngram_size: 3

augmentation:
  synonym_prob: 0.1
  swap_prob: 0.05
  deletion_prob: 0.05
  min_tokens_after_aug: 3

evaluation:
  metrics:
    - BLEU
    - ROUGE-L
    - BERTScore
    - Distinct-1
    - Distinct-2
    - SemanticSimilarity
  bertscore_model: xlm-roberta-large
  semantic_models:
    - sentence-transformers/paraphrase-multilingual-mpnet-base-v2
    - l3cube-pune/bengali-sentence-similarity-sbert
  eda_similarity_sample_size: 10000

mlflow:
  tracking_uri: outputs/mlruns
  experiment_name: bangla_health_paraphrasing

outputs:
  checkpoints: outputs/checkpoints
  logs: outputs/logs
  metrics: outputs/metrics
  figures: outputs/figures
  reports: outputs/reports
  stages: outputs/.stages
  spark_checkpoints: outputs/spark_checkpoints
