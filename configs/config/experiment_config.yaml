
experiment:
  name: bangla_health_paraphrasing
  seed: 42

dataset:
  source: faisal4590aziz/bangla-health-related-paraphrased-dataset
  train_split: 0.9
  validation_split: 0.1
  max_input_length: 128
  max_target_length: 128

spark:
  app_name: BanglaHealthParaphrasing
  shuffle_partitions: 200
  driver_memory: 8g
  executor_memory: 8g
  enable_arrow: true

models:

  main:
    name: google/mt5-small
    use_lora: true

  baselines:
    - t5-small
    - facebook/bart-base

lora:
  r: 16
  alpha: 32
  dropout: 0.1

training:
  learning_rate: 2e-5
  epochs: 5
  train_batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 4
  weight_decay: 0.01
  warmup_steps: 500
  fp16: true
  gradient_checkpointing: true
  early_stopping: true
  scheduler: cosine

evaluation:
  metrics:
    - BLEU
    - ROUGE-L
    - BERTScore
    - Distinct-1
    - Distinct-2
    - SemanticSimilarity

outputs:
  checkpoints: outputs/checkpoints
  logs: outputs/logs
  metrics: outputs/metrics
  figures: outputs/figures
  reports: outputs/reports
